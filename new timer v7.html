<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hult Prize Bangladesh Nationals 2026 Timer</title>
    
    <!-- Google Fonts: Figtree -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --hp-pink: #E5007D;
            --hp-cyan: #00C7BE;
            --hp-bg: #0a0a0a;
            --danger: #FF453A;
            --warning: #FFD60A;
            --text-main: #FFFFFF;
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: 'Figtree', monospace;
            background-color: var(--hp-bg);
            color: var(--text-main);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            background: radial-gradient(circle at 50% 60%, #1c1c1c 0%, #000000 90%);
            transition: background 1s ease;
        }

        header {
            text-align: center;
            padding-top: 3vh;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }

        h1 {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.4em;
            color: rgba(255,255,255,0.4);
            font-weight: 600;
        }

        /* UPDATED POSITION */
        .mode-badge {
            position: absolute;
            bottom: 18%;
            left: 50%;
            transform: translateX(-50%);
            
            padding: 6px 20px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.15em;

            background: rgba(0,0,0,0.3);
            border: 2px solid var(--hp-pink);
            color: var(--hp-pink);
            box-shadow: 0 0 30px rgba(229, 0, 125, 0.2);
            
            z-index: 6;
            transition: all 0.5s cubic-bezier(0.22, 1, 0.36, 1);
        }

        main {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            width: 100%;
        }

        .ring-container {
            position: absolute;
            width: 75vmin;
            height: 75vmin;
            z-index: 1;
            filter: drop-shadow(0 0 15px rgba(0,0,0,0.5));
        }

        .progress-ring__circle {
            transition: stroke-dashoffset 0.2s linear, stroke 0.6s ease;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }

        .timer-display {
            font-size: 22vw;
            font-weight: 800;
            font-variant-numeric: tabular-nums; 
            letter-spacing: -0.05em;
            z-index: 5;
            text-shadow: 0 10px 60px rgba(0,0,0,0.7);
            cursor: pointer;
        }

        footer {
            padding-bottom: 5vh;
            display: flex;
            gap: 20px;
            z-index: 10;
            transition: opacity 0.3s;
        }

        .btn {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            color: rgba(255,255,255,0.8);
            padding: 14px 32px;
            border-radius: 16px;
            font-family: 'Figtree', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn:hover {
            background: rgba(255,255,255,0.15);
            transform: translateY(-2px);
            color: white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .btn:active { transform: translateY(0); }

        .btn-main {
            background: var(--text-main);
            color: #000;
            border-color: var(--text-main);
        }

        .btn-next:hover {
            border-color: var(--hp-cyan);
            color: var(--hp-cyan);
            box-shadow: 0 0 20px rgba(0, 199, 190, 0.2);
        }

        .fullscreen-icon {
            position: absolute;
            top: 20px;
            right: 20px;
            opacity: 0.3;
            cursor: pointer;
            transition: opacity 0.3s;
        }

        .timer-display.negative {
            color: var(--danger);
            animation: urgentPulse 1s infinite;
        }
        
        .timer-display.warning {
            color: var(--warning);
        }

        @keyframes urgentPulse {
            0% { text-shadow: 0 0 20px rgba(255, 69, 58, 0.3); }
            50% { text-shadow: 0 0 60px rgba(255, 69, 58, 0.8); }
            100% { text-shadow: 0 0 20px rgba(255, 69, 58, 0.3); }
        }

        body.idle footer, body.idle header { opacity: 0.3; }
        body.idle .fullscreen-icon { opacity: 0; }
    </style>
</head>
<body>

    <svg class="fullscreen-icon" onclick="toggleFullScreen()" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>

    <header>
        <h1>Hult Prize Bangladesh Nationals 2026</h1>
    </header>

    <main onclick="toggleTimer()">
        <div class="ring-container">
            <svg width="100%" height="100%" viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="48" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="0.5" />
                <circle id="progressRing" class="progress-ring__circle" cx="50" cy="50" r="48" fill="none" stroke="#E5007D" stroke-width="2" stroke-dasharray="301.59" stroke-dashoffset="0" stroke-linecap="round"/>
            </svg>
        </div>

        <div class="timer-display" id="display">06:00</div>
        <!-- MOVED HERE -->
        <div class="mode-badge" id="modeBadge">PITCH ROUND</div>
    </main>

    <footer>
        <button class="btn btn-main" id="startBtn" onclick="toggleTimer(event)">Start Pitch</button>
        <button class="btn" onclick="resetRound()">Reset</button>
        <button class="btn btn-next" id="nextBtn" onclick="nextSequence()">Next: Q&A</button>
    </footer>

    <script>
        const CONFIG = {
            pitch: { time: 4 * 60, color: '#E5007D', label: 'PITCH ROUND', nextLabel: 'Next: Q&A' },
            qna: { time: 4 * 60, color: '#00C7BE', label: 'Q&A SESSION', nextLabel: 'Finish Team' }
        };

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playTone(freq, type, duration) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function playWarning() { playTone(600, 'sine', 0.5); }
        function playEnd() { playTone(800, 'square', 0.8); setTimeout(() => playTone(600, 'square', 0.8), 200); }

        let currentMode = 'pitch'; 
        let totalSeconds = CONFIG.pitch.time;
        let initialTime = CONFIG.pitch.time;
        let timerInterval = null;
        let isRunning = false;
        
        const displayEl = document.getElementById('display');
        const ringEl = document.getElementById('progressRing');
        const badgeEl = document.getElementById('modeBadge');
        const startBtn = document.getElementById('startBtn');
        const nextBtn = document.getElementById('nextBtn');

        const circumference = 301.59;
        ringEl.style.strokeDasharray = `${circumference} ${circumference}`;

        function updateUI() {
            const themeColor = CONFIG[currentMode].color;
            const absSec = Math.abs(totalSeconds);
            const m = Math.floor(absSec / 60);
            const s = absSec % 60;
            const text = (m < 10 ? '0' + m : m) + ":" + (s < 10 ? '0' + s : s);

            let offset = circumference - (totalSeconds / initialTime) * circumference;
            
            if (totalSeconds < 0) {
                displayEl.innerHTML = `-${text}`;
                displayEl.className = 'timer-display negative';
                ringEl.style.stroke = 'var(--danger)';
                ringEl.style.strokeDashoffset = 0;
                badgeEl.style.borderColor = 'var(--danger)';
                badgeEl.style.color = 'var(--danger)';
                badgeEl.textContent = "TIME IS UP";
            } 
            else if (totalSeconds <= 60 && totalSeconds > 0) {
                displayEl.innerHTML = text;
                displayEl.className = 'timer-display warning';
                ringEl.style.stroke = 'var(--warning)';
                ringEl.style.strokeDashoffset = offset;
                badgeEl.textContent = CONFIG[currentMode].label;
                badgeEl.style.color = themeColor;
                badgeEl.style.borderColor = themeColor;
            }
            else {
                displayEl.innerHTML = text;
                displayEl.className = 'timer-display';
                ringEl.style.stroke = themeColor;
                ringEl.style.strokeDashoffset = offset;
                badgeEl.textContent = CONFIG[currentMode].label;
                badgeEl.style.color = themeColor;
                badgeEl.style.borderColor = themeColor;
            }
        }

        function toggleTimer(e) {
            if(e) e.stopPropagation();
            
            if (isRunning) {
                clearInterval(timerInterval);
                isRunning = false;
                startBtn.textContent = "Resume";
                startBtn.classList.remove('btn-main');
            } else {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                isRunning = true;
                startBtn.textContent = "Pause";
                startBtn.classList.add('btn-main');
                
                timerInterval = setInterval(() => {
                    totalSeconds--;
                    if (totalSeconds === 60) playWarning();
                    if (totalSeconds === 0) playEnd();
                    updateUI();
                }, 1000);
            }
        }

        function nextSequence() {
            clearInterval(timerInterval);
            isRunning = false;
            
            if (currentMode === 'pitch') {
                currentMode = 'qna';
                startBtn.textContent = "Start Q&A";
            } else {
                currentMode = 'pitch';
                startBtn.textContent = "Start Pitch";
            }
            
            setupRound();
        }

        function resetRound() {
            clearInterval(timerInterval);
            isRunning = false;
            startBtn.textContent = currentMode === 'pitch' ? "Start Pitch" : "Start Q&A";
            setupRound();
        }

        function setupRound() {
            startBtn.classList.add('btn-main');
            totalSeconds = CONFIG[currentMode].time;
            initialTime = CONFIG[currentMode].time;
            nextBtn.textContent = CONFIG[currentMode].nextLabel;
            displayEl.className = 'timer-display'; 
            updateUI();
        }

        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
            }
        }

        let idleTimer;
        document.onmousemove = function() {
            document.body.classList.remove('idle');
            clearTimeout(idleTimer);
            idleTimer = setTimeout(() => {
                if(isRunning) document.body.classList.add('idle');
            }, 3000);
        };

        setupRound();
    </script>
</body>
</html>
